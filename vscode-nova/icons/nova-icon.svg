<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B2CBF" />
      <stop offset="50%" stop-color="#9D4EDD" />
      <stop offset="100%" stop-color="#E0AAFF" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer hexagonal border with gradient -->
  <polygon points="128,16 222,70 222,178 128,232 34,178 34,70" fill="url(#grad)" filter="url(#glow)" />
  
  <!-- Inner hexagon mask for dark mode/contrast -->
  <polygon points="128,26 212,74 212,174 128,222 44,174 44,74" fill="#120C1F" />
  
  <!-- Stylized letter 'N' -->
  <path d="M 76,76 L 76,180 L 100,180 L 100,122 L 156,180 L 180,180 L 180,76 L 156,76 L 156,134 L 100,76 Z" fill="url(#grad)" />
  
  <!-- Glowing Nova Star in the center -->
  <path d="M 128,100 Q 128,128 100,128 Q 128,128 128,156 Q 128,128 156,128 Q 128,128 128,100 Z" fill="#FFFFFF" />
</svg>
