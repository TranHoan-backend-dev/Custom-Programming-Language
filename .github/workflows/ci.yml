name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Compile Source and Test code
      run: |
        mkdir -p out/production/untitled
        find src -name "*.java" > sources.txt
        find test -name "*.java" >> sources.txt
        javac -encoding UTF-8 -d out/production/untitled @sources.txt

    - name: Run ParserTest
      run: java -cp out/production/untitled nova.parser.ParserTest

    - name: Run InterpreterTest
      run: java -cp out/production/untitled nova.interpreter.InterpreterTest

    - name: Run NovaReplTest
      run: java -cp out/production/untitled nova.repl.NovaReplTest
